name: Limit Sync Check
on: [push, pull_request]

jobs:
  sync-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Verify Files
        run: |
          ls -R contracts/ajo-circle/src/
          ls scripts/
      - name: Run Limit Sync Check
        run: node scripts/check-limit-sync.mjs
