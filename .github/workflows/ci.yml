name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  postgres-migrate-smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ajo_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ci -d ajo_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ajo_ci?schema=public

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma Generate
        run: pnpm prisma generate

      - name: Sync database schema (Postgres)
        run: pnpm prisma db push --accept-data-loss

      - name: DB smoke (Postgres)
        run: node scripts/ci-db-smoke.mjs

      - name: Dump migration status on failure
        if: failure()
        run: pnpm prisma migrate status

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4


      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Rust toolchain (matches contracts/ajo-circle/rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@1.85.0

        with:
          toolchain: 1.85.0
          targets: wasm32-unknown-unknown

      - name: Build & unit-test Soroban contract
        working-directory: contracts/ajo-circle
        run: |
          cargo build --target wasm32-unknown-unknown --release
          cargo test --lib

      - name: Prisma Generate
        run: pnpm prisma generate

      - name: Run frontend unit tests
        run: pnpm test:unit

      - name: Next.js build
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
          JWT_SECRET: ci-jwt-secret-must-be-at-least-32-chars-long
        run: pnpm build
